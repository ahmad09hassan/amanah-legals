<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Received &#8212; Amanah Legal Solutions</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Libre+Caslon+Text:ital@0;1&family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF7F0; --ink:#1C2130; --ink-soft:#4C5265;
  --oxblood:#722030; --gold:#A9812F; --rule:#DCD5C4; --buckram:#14100D;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--paper);color:var(--ink);
  font-family:'Archivo',sans-serif;line-height:1.7;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;
}
.card{
  max-width:560px;width:100%;background:#FFFEFA;border:1px solid var(--ink);
  padding:3rem 2.6rem;position:relative;
  box-shadow:0 24px 48px -30px rgba(28,33,48,.35);
}
.card::before{content:"";position:absolute;inset:10px;border:1px solid var(--rule);pointer-events:none;}
.docket{font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--oxblood);}
h1{font-family:'Libre Caslon Display',serif;font-weight:400;font-size:2.1rem;line-height:1.2;margin:1rem 0;}
p{color:var(--ink-soft);font-size:.98rem;margin-bottom:1rem;}
p b{color:var(--ink);}
.stamp{
  display:inline-block;margin-top:1.2rem;
  border:3px double var(--oxblood);color:var(--oxblood);
  font-family:'IBM Plex Mono',monospace;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;
  padding:.5em .9em;transform:rotate(-4deg);
}
a.back{
  display:inline-block;margin-top:2rem;color:var(--oxblood);font-weight:600;text-decoration:none;
  border-bottom:1px solid rgba(114,32,48,.35);
}
a.back:hover{border-bottom-color:var(--oxblood);}
</style>
</head>
<body>
  <div class="card">
    <span class="docket">Request received &#183; Confidential</span>
    <h1>Your request is in the queue.</h1>
    <p>We&rsquo;ll review it and respond within <b>one business day</b> with a written scope, a fixed quote, and an NDA ready to sign.</p>
    <p>Need us sooner? Call <a href="tel:+16505052194" style="color:var(--oxblood);font-weight:600;">+1 (650) 505-2194</a> or email <a href="mailto:info@amanahtalent.com" style="color:var(--oxblood);font-weight:600;">info@amanahtalent.com</a>.</p>
    <span class="stamp">Filed &#10003;</span><br>
    <a class="back" href="/">&#8592; Back to the site</a>
  </div>
</body>
</html>
